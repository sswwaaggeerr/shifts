<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tele2 | График смен — общая база</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #000000;
            padding: 24px 20px;
        }

        .app-container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .card {
            background: #0f0f0f;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }

        h1, h2, h3, label, p, span, div, td, th {
            color: #ffffff;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        button {
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #2b7e3a;
            color: white;
        }
        .btn-primary:hover {
            background: #1e5c2a;
        }

        .btn-danger {
            background: #e30613;
            color: white;
        }
        .btn-danger:hover {
            background: #b0050f;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #2b7e3a;
            color: #2b7e3a;
        }
        .btn-outline:hover {
            background: #2b7e3a;
            color: white;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #444;
        }

        select, input {
            padding: 12px 16px;
            border-radius: 48px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #2b7e3a;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .sidebar {
            flex: 1.2;
            min-width: 280px;
        }
        .main-area {
            flex: 2.5;
            min-width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }
        th {
            background: #111;
            font-weight: 700;
        }

        .status-planned {
            background: #2d2a1e;
            color: #facc15;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
        }
        .status-approved {
            background: #163a1f;
            color: #86efac;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .status-no-show {
            background: #3b1a1a;
            color: #f87171;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .role-switch {
            background: #1c1c1c;
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            gap: 8px;
        }
        .role-btn {
            background: transparent;
            color: #cccccc;
            padding: 8px 24px;
            border-radius: 60px;
        }
        .role-btn.active {
            background: #2b7e3a;
            color: white;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            background: #050505;
            padding: 16px 24px;
            border-radius: 60px;
            border: 1px solid #222;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #121212;
            padding: 6px 20px;
            border-radius: 60px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f1f1f;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 999;
            animation: fadeInOut 2s ease;
            border-left: 4px solid #2b7e3a;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px);}
            15% { opacity: 1; transform: translateY(0);}
            85% { opacity: 1; transform: translateY(0);}
            100% { opacity: 0; transform: translateY(20px);}
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .login-card {
            background: #0c0c0c;
            border-radius: 48px;
            padding: 32px;
            width: 420px;
            max-width: 90%;
            border: 1px solid #2b7e3a;
        }
        .hidden {
            display: none;
        }
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            background: #1f1f1f;
            color: #ccc;
        }
        .tab-btn.active {
            background: #2b7e3a;
            color: white;
        }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        @media (max-width: 800px) {
            .flex-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Панель входа / регистрации -->
    <div id="loginPanel" class="login-overlay">
        <div class="login-card">
            <div class="tab-buttons">
                <button id="loginTabBtn" class="tab-btn active">Вход</button>
                <button id="registerTabBtn" class="tab-btn">Регистрация</button>
            </div>
            <div id="loginForm">
                <h3 style="margin-bottom: 20px;">Добро пожаловать</h3>
                <input type="text" id="loginUsername" placeholder="Логин" style="margin-bottom: 14px;">
                <input type="password" id="loginPassword" placeholder="Пароль" style="margin-bottom: 20px;">
                <button id="doLoginBtn" class="btn-primary" style="width:100%">Войти</button>
            </div>
            <div id="registerForm" class="hidden">
                <h3 style="margin-bottom: 20px;">Регистрация</h3>
                <input type="text" id="regFullName" placeholder="ФИО" style="margin-bottom: 12px;">
                <input type="text" id="regUsername" placeholder="Логин" style="margin-bottom: 12px;">
                <input type="password" id="regPassword" placeholder="Пароль" style="margin-bottom: 12px;">
                <select id="regRole" style="margin-bottom: 12px;">
                    <option value="employee">Сотрудник</option>
                    <option value="chief">Руководитель</option>
                </select>
                <select id="regAlliance" style="margin-bottom: 12px;">
                    <option value="Пупкина">Альянс Пупкина</option>
                    <option value="Тумбочкина">Альянс Тумбочкина</option>
                    <option value="Петровича">Альянс Петровича</option>
                    <option value="Сидоровича">Альянс Сидоровича</option>
                </select>
                <select id="regGroup"></select>
                <button id="doRegisterBtn" class="btn-primary" style="width:100%; margin-top: 16px;">Зарегистрироваться</button>
            </div>
            <div id="authMessage" style="margin-top: 16px; font-size:13px; color:#e30613; text-align:center;"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="mainApp" class="hidden">
        <div class="header-bar">
            <h1>⚡ Tele2 | Управление сменами</h1>
            <div class="user-info">
                <span id="userNameDisplay" style="color:white; font-weight:500;"></span>
                <span id="userRoleBadge" style="background:#2b7e3a; padding:4px 14px; border-radius:40px; font-size:0.7rem;"></span>
                <button id="logoutBtn" class="btn-secondary">Выйти</button>
            </div>
        </div>

        <div class="flex-row">
            <!-- Левая часть (сводка) -->
            <div class="sidebar">
                <div class="card">
                    <h3>📊 Сводка (план/факт)</h3>
                    <div id="summaryStats">—</div>
                    <button id="exportCSVBtn" class="btn-outline" style="width:100%; margin-top: 20px;">📎 Выгрузить CSV</button>
                </div>
                <div class="card">
                    <h3>ℹ️ Инструкция</h3>
                    <p style="font-size:0.85rem;">👑 Руководитель: согласовывает смены и отмечает неявки.<br>
                    👤 Сотрудник: добавляет свои смены.<br>
                    💾 Все данные общие (сохраняются в браузере).</p>
                </div>
            </div>

            <!-- Правая часть (добавление + таблица) -->
            <div class="main-area">
                <div class="card">
                    <h3>✏️ Добавить смену</h3>
                    <div id="scheduleFormArea" style="margin-bottom: 12px;"></div>
                    <div style="display: flex; flex-direction: column; gap: 14px;">
                        <select id="shiftDate"></select>
                        <div style="display: flex; gap: 12px;">
                            <select id="shiftStart" style="flex:1"></select>
                            <select id="shiftEnd" style="flex:1"></select>
                        </div>
                        <button id="addShiftBtn" class="btn-primary">➕ Запланировать</button>
                        <div id="shiftWarningMsg" style="display:none; background:#2c1a1a; padding:8px; border-radius:20px; font-size:12px; color:#fca5a5;"></div>
                    </div>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;">
                        <h3 style="margin:0;">📋 График сотрудников</h3>
                        <div class="role-switch">
                            <button class="role-btn" data-role="employee">👤 Сотрудник</button>
                            <button class="role-btn" data-role="chief">👑 Руководитель</button>
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
                        <select id="statusFilter">
                            <option value="all">Все смены</option>
                            <option value="planned">Запланированные</option>
                            <option value="approved">Согласованные</option>
                            <option value="noshow">Неявки</option>
                        </select>
                        <button id="refreshBtn" class="btn-secondary">🔄 Обновить</button>
                    </div>
                    <div id="employeesTableContainer">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ЛОКАЛЬНАЯ БАЗА ДАННЫХ (общая для всех пользователей) ==========
    // Все данные хранятся в localStorage под одним ключом — это значит,
    // что все, кто открывают сайт на одном устройстве/браузере, видят одни и те же данные.
    // Для разных устройств данные будут разные, если не использовать облачный сервер.
    // Но в рамках одного компьютера/телефона — полная синхронизация между сотрудником и руководителем.
    
    let currentUser = null;
    let allShifts = [];
    let allUsers = [];
    let nextShiftId = 1;
    let nextUserId = 1;

    // Загрузка данных из localStorage
    function loadData() {
        const storedShifts = localStorage.getItem('tele2_shifts');
        const storedUsers = localStorage.getItem('tele2_users');
        
        if (storedShifts) {
            allShifts = JSON.parse(storedShifts);
            nextShiftId = Math.max(0, ...allShifts.map(s => s.id), 0) + 1;
        } else {
            allShifts = [];
            nextShiftId = 1;
        }
        
        if (storedUsers) {
            allUsers = JSON.parse(storedUsers);
            nextUserId = Math.max(0, ...allUsers.map(u => u.id), 0) + 1;
        } else {
            // Создаём демо-пользователей
            allUsers = [
                { id: 1, login: 'ivanov', password: '123', fullName: 'Сизый Александр Петрович', role: 'employee', alliance: 'Пупкина', group: 'Группа Сизых' },
                { id: 2, login: 'chief', password: '123', fullName: 'Руководитель отдела', role: 'chief', alliance: 'Пупкина', group: null }
            ];
            nextUserId = 3;
            saveUsers();
        }
        
        // Добавим пару тестовых смен, если их нет
        if (allShifts.length === 0) {
            const today = new Date().toISOString().slice(0,10);
            allShifts = [
                { id: nextShiftId++, employeeKey: 'Пупкина|Группа Сизых|Сизый Александр Петрович', alliance: 'Пупкина', group: 'Группа Сизых', employeeName: 'Сизый Александр Петрович', date: today, startTime: '09:00', endTime: '18:00', status: 'planned' }
            ];
            saveShifts();
        }
    }
    
    function saveShifts() {
        localStorage.setItem('tele2_shifts', JSON.stringify(allShifts));
    }
    
    function saveUsers() {
        localStorage.setItem('tele2_users', JSON.stringify(allUsers));
    }
    
    // Справочник сотрудников
    const groupsMap = {
        'Пупкина': ['Группа Сизых', 'Группа Василькова'],
        'Тумбочкина': ['Группа Кузнецовых'],
        'Петровича': ['Группа Морозовых'],
        'Сидоровича': ['Группа Никифоровых']
    };
    
    const employeesByGroup = {
        'Группа Сизых': ['Сизый Александр Петрович', 'Сизый Мария Ивановна'],
        'Группа Василькова': ['Васильков Иван Сергеевич', 'Василькова Ольга Васильевна'],
        'Группа Кузнецовых': ['Кузнецов Виктор Михайлович', 'Кузнецова Светлана Викторовна'],
        'Группа Морозовых': ['Морозов Андрей Владимирович', 'Морозова Ольга Андреевна'],
        'Группа Никифоровых': ['Никифоров Роман Александрович', 'Никифорова Татьяна Романовна']
    };
    
    function getAllEmployees() {
        let list = [];
        for (const [alliance, groups] of Object.entries(groupsMap)) {
            for (let grp of groups) {
                const employees = employeesByGroup[grp] || [];
                for (let emp of employees) {
                    list.push({ key: `${alliance}|${grp}|${emp}`, alliance, group: grp, name: emp });
                }
            }
        }
        return list;
    }
    
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2300);
    }
    
    // Валидация
    function isValidShift(employeeKey, date, start, end, excludeId = -1) {
        if (!start || !end) return { ok: false, reason: 'Выберите время' };
        let [sh, sm] = start.split(':').map(Number), [eh, em] = end.split(':').map(Number);
        let startMin = sh * 60 + sm, endMin = eh * 60 + em;
        if (endMin <= startMin) endMin += 1440;
        let dur = endMin - startMin;
        if (dur > 720) return { ok: false, reason: 'Смена > 12 часов' };
        if (dur < 60) return { ok: false, reason: 'Минимум 1 час' };
        
        let userShifts = allShifts.filter(s => s.employeeKey === employeeKey && s.date === date && s.id != excludeId);
        for (let s of userShifts) {
            let [sh2, sm2] = s.startTime.split(':').map(Number);
            let [eh2, em2] = s.endTime.split(':').map(Number);
            let s2Start = sh2 * 60 + sm2, s2End = eh2 * 60 + em2;
            if (s2End <= s2Start) s2End += 1440;
            if ((startMin < s2End && endMin > s2Start)) {
                return { ok: false, reason: `Пересечение с ${s.startTime}-${s.endTime}` };
            }
        }
        return { ok: true };
    }
    
    function getConsecutive(employeeKey, newDate = null) {
        let dates = allShifts.filter(s => s.employeeKey === employeeKey).map(s => s.date);
        if (newDate && !dates.includes(newDate)) dates.push(newDate);
        let uniq = [...new Set(dates)].sort();
        let max = 0, cur = 1;
        for (let i = 1; i < uniq.length; i++) {
            let diff = (new Date(uniq[i]) - new Date(uniq[i-1])) / 86400000;
            if (diff === 1) cur++;
            else { max = Math.max(max, cur); cur = 1; }
        }
        return Math.max(max, cur);
    }
    
    function addShift(empKey, empObj, date, start, end) {
        let valid = isValidShift(empKey, date, start, end);
        if (!valid.ok) { alert(valid.reason); return false; }
        if (getConsecutive(empKey, date) > 6) { alert('❌ Более 6 смен подряд'); return false; }
        
        allShifts.push({
            id: nextShiftId++,
            employeeKey: empKey,
            alliance: empObj.alliance,
            group: empObj.group,
            employeeName: empObj.name,
            date: date,
            startTime: start,
            endTime: end,
            status: 'planned'
        });
        saveShifts();
        showToast('Смена добавлена');
        return true;
    }
    
    function updateShiftStatus(shiftId, newStatus) {
        const shift = allShifts.find(s => s.id === shiftId);
        if (shift && currentUser.role === 'chief') {
            shift.status = newStatus;
            saveShifts();
            renderTables();
            showToast(newStatus === 'approved' ? '✅ Смена согласована' : '⚠️ Отмечена как неявка');
        }
    }
    
    function deleteShift(shiftId) {
        if (!confirm('Удалить смену?')) return;
        allShifts = allShifts.filter(s => s.id !== shiftId);
        saveShifts();
        renderTables();
        showToast('Смена удалена');
    }
    
    function renderTables() {
        let employees = currentUser.role === 'chief' ? getAllEmployees() : [{ 
            key: `${currentUser.alliance}|${currentUser.group}|${currentUser.fullName}`,
            alliance: currentUser.alliance,
            group: currentUser.group,
            name: currentUser.fullName
        }];
        
        let filter = document.getElementById('statusFilter')?.value || 'all';
        let html = '';
        
        for (let emp of employees) {
            let shifts = allShifts.filter(s => s.employeeKey === emp.key);
            if (filter !== 'all') {
                if (filter === 'planned') shifts = shifts.filter(s => s.status === 'planned');
                else if (filter === 'approved') shifts = shifts.filter(s => s.status === 'approved');
                else if (filter === 'noshow') shifts = shifts.filter(s => s.status === 'no-show');
            }
            shifts.sort((a, b) => a.date.localeCompare(b.date));
            
            let total = shifts.length;
            let week = shifts.filter(s => { let d = new Date(s.date).getDay(); return d >= 1 && d <= 5; }).length;
            let perc = total ? ((week / total) * 100).toFixed(1) : 0;
            let maxSeq = getConsecutive(emp.key);
            
            html += `<table style="margin-top:20px;"><caption style="text-align:left; font-weight:700; margin-bottom:8px; color:#ddd;"><strong>${emp.alliance} → ${emp.group}</strong> | ${emp.name}</caption>
                    <thead><th>Дата</th><th>Начало</th><th>Конец</th><th>Статус</th><th>Действия</th></thead><tbody>`;
            
            if (!shifts.length) {
                html += `<tr><td colspan="5">Нет смен</td></tr>`;
            }
            
            for (let sh of shifts) {
                let statusText = sh.status === 'planned' ? '📋 Запланирована' : (sh.status === 'approved' ? '✅ Согласована' : '❌ Неявка');
                let statusClass = sh.status === 'planned' ? 'status-planned' : (sh.status === 'approved' ? 'status-approved' : 'status-no-show');
                
                html += `<tr>
                            <td>${sh.date}</td>
                            <td>${sh.startTime}</td>
                            <td>${sh.endTime}</td>
                            <td><span class="${statusClass}">${statusText}</span></td>
                            <td class="action-group">`;
                
                if (currentUser.role === 'chief') {
                    if (sh.status !== 'approved') {
                        html += `<button class="btn-primary approve-btn" data-id="${sh.id}" style="padding:4px 14px;">✔️ Согласовать</button>`;
                    }
                    if (sh.status !== 'no-show') {
                        html += `<button class="btn-danger noshow-btn" data-id="${sh.id}" style="padding:4px 14px;">⚠️ Неявка</button>`;
                    }
                    html += `<button class="btn-outline delete-btn" data-id="${sh.id}" style="padding:4px 14px;">🗑️</button>`;
                } else {
                    if (sh.status === 'planned') {
                        html += `<button class="btn-outline delete-btn" data-id="${sh.id}" style="padding:4px 14px;">Отменить</button>`;
                    } else {
                        html += `<span style="color:#aaa;">—</span>`;
                    }
                }
                html += `</td></tr>`;
            }
            
            html += `<tr style="background:#0a0a0a;"><td colspan="2"><strong>📈 Показатели</strong></td>
                    <td colspan="3">Будни: ${perc}% | Выходные: ${(100-perc).toFixed(1)}% | Макс. подряд: ${maxSeq}/6</td></tr>`;
            html += `</tbody></table>`;
        }
        
        document.getElementById('employeesTableContainer').innerHTML = html || '<p style="color:white;">Нет данных</p>';
        attachEvents();
        
        // Сводка
        let visible = currentUser.role === 'chief' ? allShifts : allShifts.filter(s => s.employeeKey === `${currentUser.alliance}|${currentUser.group}|${currentUser.fullName}`);
        let approved = visible.filter(s => s.status === 'approved').length;
        let planned = visible.filter(s => s.status === 'planned').length;
        let noshow = visible.filter(s => s.status === 'no-show').length;
        let percent = visible.length ? ((approved / visible.length) * 100).toFixed(1) : 0;
        
        document.getElementById('summaryStats').innerHTML = `<div style="background:#111; border-left:4px solid #2b7e3a; padding:14px; border-radius:20px;">
            🎯 <strong>Выполнение плана:</strong> ${percent}%<br>
            ✅ Согласовано: ${approved} &nbsp;|&nbsp; 📋 Ожидают: ${planned} &nbsp;|&nbsp; ❌ Неявки: ${noshow}
        </div>`;
    }
    
    function attachEvents() {
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.onclick = () => updateShiftStatus(parseInt(btn.dataset.id), 'approved');
        });
        document.querySelectorAll('.noshow-btn').forEach(btn => {
            btn.onclick = () => { if (confirm('Отметить неявку?')) updateShiftStatus(parseInt(btn.dataset.id), 'no-show'); };
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deleteShift(parseInt(btn.dataset.id));
        });
    }
    
    function generateDates() {
        let sel = document.getElementById('shiftDate');
        let today = new Date(); today.setHours(0,0,0,0);
        sel.innerHTML = '';
        for (let i = 0; i < 14; i++) {
            let d = new Date(today); d.setDate(today.getDate() + i);
            let val = d.toISOString().slice(0,10);
            let weekdays = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
            sel.appendChild(new Option(`${val} (${weekdays[d.getDay()]})`, val));
        }
    }
    
    function populateTimes() {
        let startSel = document.getElementById('shiftStart'), endSel = document.getElementById('shiftEnd');
        startSel.innerHTML = '';
        endSel.innerHTML = '<option value="">-- Конец --</option>';
        for (let h = 6; h < 24; h++) {
            for (let m of [0, 15, 30, 45]) {
                let val = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                startSel.appendChild(new Option(val, val));
            }
        }
        for (let h = 0; h < 25; h++) {
            for (let m of [0, 15, 30, 45]) {
                if (h === 24 && m > 0) continue;
                let val = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                endSel.appendChild(new Option(val, val));
            }
        }
    }
    
    function setupAddForRole() {
        let container = document.getElementById('scheduleFormArea');
        if (currentUser.role === 'chief') {
            let employees = getAllEmployees();
            let html = `<label style="color:#ccc;">👥 Сотрудник</label><select id="targetEmployeeSelect" style="width:100%; margin-bottom:12px;">`;
            employees.forEach(e => html += `<option value="${e.key}">${e.name} (${e.group})</option>`);
            html += `</select>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `<p><strong>${currentUser.fullName}</strong> (${currentUser.group})</p>`;
        }
        
        let btn = document.getElementById('addShiftBtn');
        let newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.onclick = () => {
            let targetEmp, targetKey;
            if (currentUser.role === 'chief') {
                let sel = document.getElementById('targetEmployeeSelect');
                targetKey = sel.value;
                targetEmp = getAllEmployees().find(e => e.key === targetKey);
            } else {
                targetEmp = { key: `${currentUser.alliance}|${currentUser.group}|${currentUser.fullName}`, alliance: currentUser.alliance, group: currentUser.group, name: currentUser.fullName };
                targetKey = targetEmp.key;
            }
            let date = document.getElementById('shiftDate').value;
            let start = document.getElementById('shiftStart').value;
            let end = document.getElementById('shiftEnd').value;
            if (!date || !start || !end) { alert('Заполните дату и время'); return; }
            if (addShift(targetKey, targetEmp, date, start, end)) {
                renderTables();
                document.getElementById('shiftStart').value = '';
                document.getElementById('shiftEnd').value = '';
            }
        };
    }
    
    function switchRole(role) {
        if (currentUser.role === role) return;
        currentUser.role = role;
        document.querySelectorAll('.role-btn').forEach(b => {
            if (b.dataset.role === role) b.classList.add('active');
            else b.classList.remove('active');
        });
        setupAddForRole();
        renderTables();
    }
    
    function initAfterLogin() {
        document.getElementById('loginPanel').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = currentUser.fullName;
        let roleSpan = document.getElementById('userRoleBadge');
        roleSpan.innerText = currentUser.role === 'chief' ? 'Руководитель' : 'Сотрудник';
        
        generateDates();
        populateTimes();
        setupAddForRole();
        renderTables();
        
        document.getElementById('refreshBtn').onclick = () => renderTables();
        document.getElementById('statusFilter').onchange = () => renderTables();
        document.getElementById('exportCSVBtn').onclick = () => {
            let shifts = currentUser.role === 'chief' ? allShifts : allShifts.filter(s => s.employeeKey === `${currentUser.alliance}|${currentUser.group}|${currentUser.fullName}`);
            let rows = [["Сотрудник","Альянс","Группа","Дата","Начало","Конец","Статус"]];
            shifts.forEach(s => {
                let statusTxt = s.status === 'planned' ? 'Запланирована' : (s.status === 'approved' ? 'Согласована' : 'Неявка');
                rows.push([s.employeeName, s.alliance, s.group, s.date, s.startTime, s.endTime, statusTxt]);
            });
            let csv = rows.map(r => r.map(c => `"${c}"`).join(";")).join("\n");
            let blob = new Blob(["\uFEFF" + csv], {type: "text/csv"});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `shifts_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
        };
        
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.onclick = () => switchRole(btn.dataset.role);
        });
    }
    
    // Регистрация и вход
    document.getElementById('doLoginBtn').onclick = () => {
        let login = document.getElementById('loginUsername').value.trim();
        let pwd = document.getElementById('loginPassword').value.trim();
        let user = allUsers.find(u => u.login === login && u.password === pwd);
        if (!user) {
            document.getElementById('authMessage').innerText = 'Неверный логин/пароль';
            return;
        }
        currentUser = { ...user };
        initAfterLogin();
    };
    
    document.getElementById('doRegisterBtn').onclick = () => {
        let full = document.getElementById('regFullName').value.trim();
        let login = document.getElementById('regUsername').value.trim();
        let pwd = document.getElementById('regPassword').value.trim();
        let role = document.getElementById('regRole').value;
        let alliance = document.getElementById('regAlliance').value;
        let group = document.getElementById('regGroup').value;
        
        if (!full || !login || !pwd || (role === 'employee' && !group)) {
            alert('Заполните все поля');
            return;
        }
        if (allUsers.find(u => u.login === login)) {
            document.getElementById('authMessage').innerText = 'Логин уже существует';
            return;
        }
        
        let newUser = {
            id: nextUserId++,
            login: login,
            password: pwd,
            fullName: full,
            role: role,
            alliance: alliance,
            group: group || null
        };
        allUsers.push(newUser);
        saveUsers();
        document.getElementById('authMessage').innerText = '✅ Регистрация успешна! Войдите.';
        document.getElementById('registerTabBtn').click();
    };
    
    function updateGroupSelect() {
        let alliance = document.getElementById('regAlliance').value;
        let groupSel = document.getElementById('regGroup');
        groupSel.innerHTML = '<option value="">-- Группа --</option>';
        (groupsMap[alliance] || []).forEach(g => groupSel.appendChild(new Option(g, g)));
    }
    
    document.getElementById('regAlliance').addEventListener('change', updateGroupSelect);
    document.getElementById('regRole').addEventListener('change', updateGroupSelect);
    
    document.getElementById('loginTabBtn').onclick = () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('registerTabBtn').classList.remove('active');
    };
    document.getElementById('registerTabBtn').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
        updateGroupSelect();
    };
    document.getElementById('logoutBtn').onclick = () => location.reload();
    
    // Инициализация
    loadData();
    updateGroupSelect();
</script>
</body>
</html>
